<div class="flex h-screen w-screen overflow-hidden bg-[#FBFAF9]">
  <!-- main side bar -->
  <div class="h-full bg-[#F1F0EE] w-16 flex flex-col justify-between">
    <!-- Top Section -->
    <div class="flex flex-col items-center mt-4 space-y-6">
      <!-- Profile / Logo -->
      <div class="w-10 h-10 rounded-full overflow-hidden bg-gray-400 flex items-center justify-center">
        <img src="images/greenlogo.png" alt="Profile" class="object-cover w-full h-full" />
      </div>

      <!-- Navigation Links -->
      <div class="flex flex-col items-center justify-center space-y-2 w-full mt-45">
        <a [routerLink]="['/dashboard/links']"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"
           class="flex flex-col items-center justify-center py-2 rounded-2xl w-full">
          <lucide-icon name="gallery-vertical-end" class="w-5 h-5 text-gray-700"></lucide-icon>
          <span class="text-xs font-medium">Links</span>
        </a>

        <a [routerLink]="['/dashboard/design']"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"
           class="flex flex-col items-center justify-center py-2 rounded-2xl w-full">
          <lucide-icon name="pencil" class="w-5 h-5 text-gray-700"></lucide-icon>
          <span class="text-xs font-medium">Design</span>
        </a>

        <a [routerLink]="['/dashboard/account']"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"
           class="flex flex-col items-center justify-center py-2 rounded-2xl w-full">
          <lucide-icon name="settings" class="w-5 h-5 text-gray-700"></lucide-icon>
          <span class="text-xs font-medium">Account</span>
        </a>
      </div>
    </div>

    <!-- Logout -->
    <div class="flex justify-center mb-4">
      <button (click)="logout()"
        class="flex flex-col items-center justify-center space-y-1 px-4 py-2 text-red-500 hover:bg-gray-100 rounded-2xl transition w-full">
        <lucide-icon name="log-out" class="w-5 h-5"></lucide-icon>
        <span class="text-xs font-medium">Logout</span>
      </button>
    </div>
  </div>

  <!-- main content -->
  <div class="flex h-full w-[60%]" [class.w-[63%]]="showRightSidebar" [class.w-[87%]]="!showRightSidebar">
    <div class="w-full h-[96%] mt-4">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- side bar -->
  <div *ngIf="showRightSidebar" class="flex flex-col items-center h-full w-[40%] border-l border-gray-300">
    <div class="h-[7%] w-full flex items-center px-15">
      <div class="bg-white rounded-2xl w-full h-[60%] text-sm font-semibold flex items-center justify-center shadow-sm">
        <span class="text-gray-700 font-medium"> linktree/{{ username }} </span>
      </div>
    </div>
    <div class="flex items-center justify-center h-[93%] w-full">
      <div class="bg-[#EFF1F3] rounded-3xl w-60 h-125 shadow-xl flex flex-col items-center p-4">
        <!-- Top icon -->
        <div class="self-start">
          <button class="w-6 h-6 bg-white rounded-full flex items-center justify-center">
            <img src="/images/blacklogo.png" class="w-3 h-3" alt="" />
          </button>
        </div>

        <!-- Profile picture -->
        <div class="flex flex-col items-center mt-8 gap-2 mb-55">
          <div class="w-16 h-16 bg-gray-400 rounded-full">
            <img [src]="avatarUrl ? avatarUrl : 'images/user.png'" alt="Profile"
              class="rounded-full object-cover w-full h-full" />
          </div>
          <span class="text-gray-700 text-sm font-semibold">{{ name }} </span>
        </div>

        <!-- Join button -->
        <button class="bg-white w-auto text-black text-xs font-semibold px-4 py-2 rounded-full shadow-md">
          Create your on Linktree
        </button>
      </div>
    </div>
  </div>
</div>
