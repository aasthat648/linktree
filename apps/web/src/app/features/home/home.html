<div class="min-h-screen bg-black flex items-center justify-center">
  <!-- CENTER CARD -->
  <div class="w-105 h-170 bg-[#EFF1F3] rounded-3xl shadow-xl flex flex-col p-6">
    <!-- Top icon -->
    <div class="self-start">
      <button class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
        <img src="/images/blacklogo.png" class="w-4 h-4" alt="Logo" />
      </button>
    </div>

    <!-- Profile picture -->
    <div class="flex flex-col items-center mt-10 gap-3 mb-5">
      <div class="w-20 h-20 bg-gray-400 rounded-full">
        <img
          [src]="avatarUrl ? avatarUrl : 'images/user.png'"
          alt="Profile"
          class="w-20 h-20 rounded-full border border-gray-300 object-cover"
        />
      </div>
      <span class="text-gray-700 text-lg font-semibold">{{ name }}</span>
    </div>

    <!-- Links -->
    <div class="w-full p-2 flex flex-wrap gap-4 justify-center">
      <ng-container *ngFor="let link of links">
        <div class="relative group">
          <a
            [href]="link.link"
            target="_blank"
            class="bg-white w-9 h-9 rounded-full shadow-md hover:shadow-lg transition duration-300 flex items-center justify-center overflow-hidden"
          >
            <!-- Show image if provided -->
            <img
              *ngIf="link.icon"
              [src]="link.icon"
              alt="{{ link.platform }}"
              class="w-full h-full object-cover"
            />
          </a>

          <!-- Tooltip -->
          <div
            class="absolute bottom-full mb-2 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-xs rounded py-1 px-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none"
          >
            {{ link.platform | titlecase }}
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Create Button always at bottom -->
    <div class="mt-auto w-full flex justify-center mb-3">
      <button
        class="bg-white w-auto text-black text-sm font-semibold px-10 py-3 rounded-full shadow-md"
      >
        Create your own Linktree
      </button>
    </div>
  </div>
</div>
