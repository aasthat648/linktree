<div class="flex min-h-screen w-full items-center justify-center bg-gray-100">
  <div class="w-full max-w-sm rounded-2xl bg-white px-8 py-10 shadow-lg">
    <h1 class="mb-8 text-center text-2xl font-bold text-gray-800">
      Admin Login
    </h1>

    @if (serverError) {
      <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ serverError }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()" class="flex flex-col gap-6">
      <div>
        <label class="mb-2 block text-sm font-medium text-gray-700">
          Username
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <lucide-icon name="user" class="h-5 w-5"></lucide-icon>
          </span>
          <input
            type="text"
            formControlName="username"
            placeholder="Enter username"
            class="w-full rounded-xl border py-3 pl-10 pr-4 focus:outline-none focus:ring-1"
            [class.border-red-500]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            [class.border-gray-300]="!(loginForm.get('username')?.invalid && loginForm.get('username')?.touched)"
            [class.focus:ring-red-500]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            [class.focus:ring-gray-500]="!(loginForm.get('username')?.invalid && loginForm.get('username')?.touched)"
          />
        </div>
        @if (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) {
          <p class="mt-1.5 text-sm font-medium text-red-600">
            Username is required
          </p>
        }
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-gray-700">
          Password
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <lucide-icon name="lock" class="h-5 w-5"></lucide-icon>
          </span>
          <input
            type="password"
            formControlName="password"
            placeholder="Enter password"
            class="w-full rounded-xl border py-3 pl-10 pr-4 focus:outline-none focus:ring-1"
            [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            [class.border-gray-300]="!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)"
            [class.focus:ring-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            [class.focus:ring-gray-500]="!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)"
          />
        </div>
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <p class="mt-1.5 text-sm font-medium text-red-600">
            Password is required
          </p>
        }
      </div>

      <button
        type="submit"
        class="flex w-full items-center justify-center gap-2 rounded-xl bg-gray-800 py-3 font-semibold text-white transition hover:bg-gray-900"
      >
        <lucide-icon name="log-in" class="h-5 w-5"></lucide-icon>
        Login
      </button>
    </form>
  </div>
</div>
